<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greenroom - Moved!</title>
  <style>
    :root {
      --bg: #eefbe7;
      --card: #ffffff;
      --ink: #20311f;
      --muted: #61705e;
      --lime: #9be564;
      --border: #d8efc9;
      --shadow: 0 12px 34px rgba(76, 110, 50, 0.12);
      --danger: #ef6b6b;
    }

    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #f4ffe9 0%, var(--bg) 100%);
      color: var(--ink);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .hero-card {
      background: linear-gradient(135deg, #ffffff, #fafff5);
      border: 2px dashed var(--lime);
      border-radius: 28px;
      padding: 40px 32px;
      box-shadow: var(--shadow);
      max-width: 540px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* A little decorative accent to make it stick out */
    .hero-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(90deg, var(--lime), #76d939);
    }

    .title { 
      margin: 0 0 12px;
      font-size: clamp(32px, 5vw, 48px); 
      line-height: 1.05; 
      letter-spacing: -0.03em; 
      font-weight: 900;
    }

    .subtitle { 
      margin: 0 0 24px; 
      color: var(--muted); 
      font-size: 16px;
      line-height: 1.6;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 14px;
      background: #ffeded;
      border: 1px solid #ffb3b3;
      color: #5a1010;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .primary-btn {
      background: linear-gradient(180deg, var(--lime), #76d939);
      color: #14380e;
      border: none; 
      border-radius: 16px; 
      padding: 16px 28px;
      font-size: 16px; 
      font-weight: 800; 
      cursor: pointer; 
      transition: transform .12s ease, box-shadow .12s ease;
      box-shadow: 0 8px 18px rgba(80, 125, 48, 0.16);
      text-decoration: none;
      display: inline-block;
    }

    .primary-btn:hover { 
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(80, 125, 48, 0.22);
    }
  </style>
</head>
<body>

  <div class="hero-card">
    <div class="status-pill">Link Relocated</div>
    <h1 class="title">We've Moved!</h1>
    <p class="subtitle">
      The repository for the Greenroom Drag Race Simulator has been updated, which means this link is no longer active. Don't worry—the simulator is still alive, well, and updated!
      <br><br>
      <strong>Please check our Discord server to get the brand new link.</strong>
    </p>
    
    <a href="https://discord.gg/BqTTyvx4kF" class="primary-btn">Join the Discord</a>
  </div>

</body>
</html>
